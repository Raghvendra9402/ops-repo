apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-dep
  namespace: next
spec:
  replicas: 2
  selector:
    matchLabels:
      app: next-app
  template:
    metadata:
      labels:
        app: next-app
    spec:
      containers:
        - name: next-app
          image: xanderflinn/deploy-demo:655a0715d67abf37f3dc8303f0cc33dc4f22dbf0
          ports:
            - containerPort: 3000
